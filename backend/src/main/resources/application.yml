spring:
  application:
    name: javacup-backend

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

javacup:
  supabase:
    jwt-secret: ${SUPABASE_JWT_SECRET}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health