name: Deploy
on:
  push:
    branches:
      - main

# Backend (Render) and frontend (Vercel) both auto-deploy on push to main via their
# own GitHub integrations — no trigger step is needed here. This workflow's job is to
# wait for those deploys to roll out, then verify both surfaces are actually healthy.
jobs:
  # ─── POST-DEPLOY HEALTH CHECK ─────────────────────────────────────────────
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deploys to roll out
        # Give Render time to build the Docker image and start the service, and
        # Vercel time to publish. Render Docker builds are the slow part.
        run: sleep 180

      - name: Check backend health endpoint
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            https://api.javacup.dev/api/v1/health)
          echo "Backend health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Backend health check FAILED — service may not be responding."
            exit 1
          fi
          echo "Backend health check PASSED — api.javacup.dev is live."

      - name: Check frontend
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            https://javacup.dev)
          echo "Frontend status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Frontend check FAILED — site may not be responding."
            exit 1
          fi
          echo "Frontend check PASSED — javacup.dev is live."
